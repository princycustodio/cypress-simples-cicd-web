name: Cypress Tests

on:
  push:
    branches:
      - master

  pull_request:
    branches:
      - master

jobs:
  cypress-run:

    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:

      - name: Checkout Projeto
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Cypress
        uses: cypress-io/github-action@v6
